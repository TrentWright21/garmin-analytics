<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets us pad with env(safe-area-inset-*) on iPhone
         (notch / Dynamic Island / home indicator). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- The design system is light-only; "dark" here made iOS render dark form
         controls and scrollbars on a white app. -->
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-title" content="Waypoint" />
    <title>Waypoint — Trent's Coach</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
