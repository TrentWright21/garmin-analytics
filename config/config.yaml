# Non-secret application configuration. Safe to commit.
log_level: INFO
log_json: false          # set true when running in Docker
timezone: America/Chicago
units: imperial

sync:
  hour: 6                # daily Garmin sync at 06:30 local
  minute: 30
  backfill_days: 30      # history fetched on very first run

# Automated morning message. Off by default. Turn on `enabled` AND set the
# channel secrets in .env (GA_TELEGRAM_BOT_TOKEN / GA_TELEGRAM_CHAT_ID) to get a
# daily push a few minutes after the sync. `ai_polish` rewrites the brief with
# Claude (needs GA_ANTHROPIC_API_KEY; one API call per morning). See DEPLOY.md.
notify:
  enabled: false
  hour: 6
  minute: 35
  ai_polish: false

# Home location for the local weather feed (Open-Meteo, no API key needed).
location:
  name: Hartselle, AL
  latitude: 34.4426
  longitude: -86.9353

# Your next goal event. Only name + date are required; distance_m / goal_time
# are for actual races (they feed the pace planner). Delete this block to hide
# the countdown, or change it to whatever event you're training for.
event:
  name: Mount Whitney Summit
  date: 2026-08-01
  kind: climb
