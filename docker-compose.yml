services:
  backend:
    build: .
    container_name: garmin-analytics
    restart: unless-stopped
    ports:
      # Dashboard + API at http://localhost:3000, reachable only from this
      # machine (the 127.0.0.1 bind keeps it off your local network).
      - "127.0.0.1:3000:8000"
    env_file: .env
    environment:
      GA_ENVIRONMENT: prod
      GA_DATABASE_URL: sqlite:////srv/data/garmin.db
      GA_GARMIN_TOKENS_DIR: /srv/data/garmin_tokens
    volumes:
      - ./data:/srv/data          # db + garmin tokens persist on the host
      - ./config:/srv/config:ro   # config.yaml, read-only in container
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"
      interval: 60s
      timeout: 5s
      retries: 3
